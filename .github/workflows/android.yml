# =============================================================================
# Android 构建工作流（移动端 T-M020 一期）
# =============================================================================
#
# 触发方式：
#   - workflow_dispatch（手动触发）
#   - 推送 v*.*.*-mobile.* 格式的 Tag（与桌面 v*.*.* 区分，避免桌面构建 +
#     Android 构建相互打架）
#
# 当前状态：
#   - 只构建 debug APK（自签名，可侧载）
#   - 不构建 AAB（AAB 上 Google Play 必须用正式 keystore，下迭代加 GitHub
#     Secrets 后启用）
#
# 产物：
#   - app-aarch64-debug.apk（仅 ARM64 主流真机）
#   - app-armv7-debug.apk（兼容老机型，可选）
#
# 上传到：
#   - GitHub Actions Artifacts（90 天后自动清理）
#   - 后续可加上传到 Release / R2
# =============================================================================

name: Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型（debug 自签名 / release 需要 keystore）'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - 'v*.*.*-mobile.*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Set NDK env vars
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # Android target 单独 key，避免与桌面构建缓存互冲
          key: 'android-${{ matrix.target || ''aarch64'' }}'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Tauri Android build (debug)
        if: github.event.inputs.build_type != 'release'
        run: pnpm exec tauri android build --apk --debug --target aarch64

      - name: Tauri Android build (release)
        if: github.event.inputs.build_type == 'release'
        env:
          # 占位：当用户配好 keystore 后，把以下 Secrets 全设上即可启用 release 签名
          # ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          # ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          # ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          # ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          DUMMY: 'placeholder'
        run: |
          echo "::warning::release 构建需要 keystore Secrets，目前未配置，跳过签名"
          pnpm exec tauri android build --apk --target aarch64

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' | head -n 1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-base-android-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      # 仅在 tag 触发时附加到 GitHub Release（草稿）
      - name: Attach APK to Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
